<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PoC Index</title>
<style>
  :root {
    --bg: #0a1f38;
    --bg-grid: rgba(95, 180, 229, 0.07);
    --surface: #10294a;
    --surface-hover: #163155;
    --accent: #5fb4e5;
    --accent-warm: #ff8a4c;
    --text-primary: #eaf2fa;
    --text-secondary: #7e93b0;
    --border: rgba(95, 180, 229, 0.25);
    --border-strong: rgba(95, 180, 229, 0.55);
    --font-display: 'Space Mono', 'Courier New', monospace;
    --font-body: 'Inter', -apple-system, 'Segoe UI', sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background-color: var(--bg);
    background-image:
      linear-gradient(var(--bg-grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
    background-size: 32px 32px;
    color: var(--text-primary);
    font-family: var(--font-body);
    min-height: 100vh;
  }

  a { color: inherit; text-decoration: none; }

  a:focus-visible,
  button:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }

  .sheet {
    max-width: 1040px;
    margin: 0 auto;
    padding: 28px 24px 80px;
  }

  /* ---- Title block (blueprint drawing header) ---- */
  .title-block {
    display: flex;
    justify-content: space-between;
    align-items: stretch;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    margin-bottom: 48px;
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--text-secondary);
    text-transform: uppercase;
  }

  .title-block__main {
    padding: 14px 20px;
    border-right: 1px solid var(--border);
  }

  .title-block__main .label {
    color: var(--text-secondary);
    font-size: 10px;
  }

  .title-block__main .value {
    color: var(--text-primary);
    font-size: 15px;
    letter-spacing: 0.02em;
    margin-top: 4px;
  }

  .title-block__meta {
    display: flex;
  }

  .title-block__cell {
    padding: 14px 18px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-width: 76px;
  }

  .title-block__cell:last-child { border-right: none; }

  .title-block__cell .value {
    color: var(--accent);
    font-size: 14px;
    margin-top: 4px;
  }

  /* ---- Hero ---- */
  .hero {
    margin-bottom: 56px;
  }

  .hero .eyebrow {
    font-family: var(--font-display);
    font-size: 12px;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .hero h1 {
    font-family: var(--font-display);
    font-size: clamp(28px, 4vw, 40px);
    font-weight: 700;
    line-height: 1.25;
    margin: 0 0 12px;
    color: var(--text-primary);
  }

  .hero p {
    font-size: 15px;
    color: var(--text-secondary);
    max-width: 520px;
    line-height: 1.7;
    margin: 0;
  }

  /* ---- Grid / cards ---- */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }

  .card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 22px 20px 20px;
    transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    opacity: 0;
    transform: translateY(10px);
    animation: rise 0.5s ease forwards;
  }

  .card:hover,
  .card:focus-within {
    background: var(--surface-hover);
    border-color: var(--border-strong);
    transform: translateY(-3px);
  }

  /* registration marks — corner crosshairs, like blueprint alignment marks */
  .card::before,
  .card::after,
  .card .mark-tr,
  .card .mark-br {
    content: "";
    position: absolute;
    width: 9px;
    height: 9px;
    border: 1px solid var(--border-strong);
    opacity: 0.7;
  }
  .card::before { top: 6px; left: 6px; border-right: none; border-bottom: none; }
  .card::after  { bottom: 6px; left: 6px; border-right: none; border-top: none; }
  .card .mark-tr { top: 6px; right: 6px; border-left: none; border-bottom: none; }
  .card .mark-br { bottom: 6px; right: 6px; border-left: none; border-top: none; }

  .card .spec-no {
    font-family: var(--font-display);
    font-size: 11px;
    color: var(--text-secondary);
    letter-spacing: 0.1em;
    margin-bottom: 10px;
  }

  .card h2 {
    font-family: var(--font-body);
    font-size: 17px;
    font-weight: 600;
    margin: 0 0 18px;
    color: var(--text-primary);
    word-break: break-word;
  }

  .card .open-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-display);
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .card .open-link svg {
    width: 12px;
    height: 12px;
    transition: transform 0.18s ease;
  }

  .card:hover .open-link svg {
    transform: translateX(3px);
  }

  @keyframes rise {
    to { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .card { animation: none; opacity: 1; transform: none; }
    .card, .card:hover { transition: none; }
  }

  /* ---- State messages ---- */
  .state-msg {
    font-family: var(--font-display);
    font-size: 13px;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
    padding: 20px 0;
  }

  .state-msg.error {
    color: var(--accent-warm);
  }

  footer {
    margin-top: 64px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-family: var(--font-display);
    font-size: 11px;
    color: var(--text-secondary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  @media (max-width: 480px) {
    .title-block { flex-direction: column; }
    .title-block__main { border-right: none; border-bottom: 1px solid var(--border); }
    .title-block__meta { border-top: none; }
  }
</style>
</head>
<body>

<div class="sheet">

  <!-- 設計図の「タイトルブロック」を模した見出し -->
  <div class="title-block">
    <div class="title-block__main">
      <div class="label">Project</div>
      <div class="value">PoC Index</div>
    </div>
    <div class="title-block__meta">
      <div class="title-block__cell">
        <div class="label">Sheet</div>
        <div class="value" id="sheet-count">01/01</div>
      </div>
      <div class="title-block__cell">
        <div class="label">Rev</div>
        <div class="value">A</div>
      </div>
    </div>
  </div>

  <div class="hero">
    <div class="eyebrow">Prototype catalog</div>
    <h1>試作品の一覧</h1>
    <p>ここに置かれた各PoCへのリンクです。新しいフォルダを追加してpushすると、次にこのページを開いたときに自動で一覧に加わります。</p>
  </div>

  <div id="grid" class="grid">
    <div class="state-msg" id="status-msg">読み込み中...</div>
  </div>

  <footer>Static demo catalog — updates on push</footer>
</div>

<script>
  // ↓↓↓ ここを自分のGitHubユーザー名・リポジトリ名に書き換えてください ↓↓↓
  const OWNER = "iwasakiterukazuimpl";
  const REPO = "poc-test";
  // ↑↑↑ ここを自分のGitHubユーザー名・リポジトリ名に書き換えてください ↑↑↑

  const grid = document.getElementById("grid");
  const statusMsg = document.getElementById("status-msg");
  const sheetCount = document.getElementById("sheet-count");

  function openIcon() {
    return '<svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">' +
      '<path d="M2 10L10 2M10 2H4M10 2V8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>' +
      '</svg>';
  }

  function renderCards(dirs) {
    grid.innerHTML = "";

    if (dirs.length === 0) {
      grid.innerHTML = '<div class="state-msg">まだPoCがありません。poc- で始まるフォルダを追加してください。</div>';
      sheetCount.textContent = "00/00";
      return;
    }

    sheetCount.textContent = String(dirs.length).padStart(2, "0") + "/" + String(dirs.length).padStart(2, "0");

    dirs.forEach((dir, i) => {
      const card = document.createElement("a");
      card.href = "./" + dir.name + "/";
      card.className = "card";
      card.style.animationDelay = (i * 0.06) + "s";

      const displayName = dir.name
        .replace(/^poc-/, "")
        .replace(/[-_]/g, " ")
        .replace(/\b\w/g, c => c.toUpperCase());

      card.innerHTML =
        '<span class="mark-tr"></span><span class="mark-br"></span>' +
        '<div class="spec-no">POC-' + String(i + 1).padStart(2, "0") + '</div>' +
        '<h2>' + displayName + '</h2>' +
        '<span class="open-link">Open ' + openIcon() + '</span>';

      grid.appendChild(card);
    });
  }

  fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/`)
    .then(res => {
      if (!res.ok) throw new Error("GitHub API error: " + res.status);
      return res.json();
    })
    .then(items => {
      const dirs = items
        .filter(item => item.type === "dir" && item.name.startsWith("poc-"))
        .sort((a, b) => a.name.localeCompare(b.name));
      renderCards(dirs);
    })
    .catch(err => {
      statusMsg.className = "state-msg error";
      statusMsg.textContent = "一覧の取得に失敗しました（" + err.message + "）";
      grid.innerHTML = "";
      grid.appendChild(statusMsg);
      console.error(err);
    });
</script>

</body>
</html>
