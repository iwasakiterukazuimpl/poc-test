<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PoC Catalog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* --- Brand green (base: #87b828) --- */
    --brand-50:  #f6fae9;
    --brand-100: #eaf3cb;
    --brand-200: #d3e79a;
    --brand-300: #b9d869;
    --brand-400: #a0c93f;
    --brand-500: #87b828;
    --brand-600: #6d9720;
    --brand-700: #56761d;
    --brand-800: #3f5817;
    --brand-900: #2a3c10;

    /* --- Neutral (slate) --- */
    --n-50:  #f8fafc;
    --n-100: #f1f5f9;
    --n-200: #e2e8f0;
    --n-300: #cbd5e1;
    --n-400: #94a3b8;
    --n-500: #64748b;
    --n-600: #475569;
    --n-700: #334155;
    --n-800: #1e293b;
    --n-900: #0f172a;

    --error: #dc2626;
    --bg-grid: rgba(135, 184, 40, 0.07); /* brand-500 を7%重ねた罫線 */

    --font-display: 'Space Grotesk', 'Noto Sans JP', sans-serif;
    --font-body: 'Inter', 'Noto Sans JP', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background-color: var(--n-50);
    background-image:
      linear-gradient(var(--bg-grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
    background-size: 32px 32px;
    color: var(--n-900);
    font-family: var(--font-body);
    min-height: 100vh;
  }

  a { color: inherit; text-decoration: none; }

  a:focus-visible, button:focus-visible {
    outline: 2px solid var(--brand-600);
    outline-offset: 3px;
  }

  .wrap {
    max-width: 1040px;
    margin: 0 auto;
    padding: 48px 24px 90px;
  }

  /* ---- Header ---- */
  .top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 56px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--brand-500);
    box-shadow: 0 0 0 4px var(--brand-100);
  }

  .brand span {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--n-600);
    letter-spacing: 0.04em;
  }

  .status-pill {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--brand-800);
    background: var(--brand-100);
    padding: 5px 12px;
    border-radius: 999px;
    border: 1px solid var(--brand-200);
  }

  /* ---- Hero ---- */
  .hero {
    margin-bottom: 48px;
  }

  .hero .eyebrow {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--brand-700);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .hero h1 {
    font-family: var(--font-display);
    font-size: clamp(28px, 4vw, 38px);
    font-weight: 700;
    line-height: 1.3;
    margin: 0 0 14px;
    color: var(--n-900);
  }

  .hero p {
    font-size: 15px;
    color: var(--n-600);
    max-width: 520px;
    line-height: 1.8;
    margin: 0;
  }

  /* ---- Grid / cards ---- */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 18px;
  }

  .card {
    position: relative;
    background: #fff;
    border: 1px solid var(--n-200);
    border-radius: 12px;
    padding: 20px 20px 18px;
    transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
    opacity: 0;
    transform: translateY(8px);
    animation: rise 0.45s ease forwards;
    overflow: hidden;
  }

  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--brand-500);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.2s ease;
  }

  .card:hover,
  .card:focus-within {
    border-color: var(--brand-300);
    box-shadow: 0 8px 20px -8px rgba(109, 151, 32, 0.35);
    transform: translateY(-3px);
  }

  .card:hover::before,
  .card:focus-within::before {
    transform: scaleX(1);
  }

  .card .spec-no {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--brand-700);
    background: var(--brand-50);
    padding: 3px 8px;
    border-radius: 6px;
    letter-spacing: 0.04em;
    margin-bottom: 12px;
  }

  .card h2 {
    font-family: var(--font-body);
    font-size: 16px;
    font-weight: 600;
    margin: 0 0 18px;
    color: var(--n-900);
    word-break: break-word;
  }

  .card .open-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--brand-700);
    letter-spacing: 0.03em;
  }

  .card .open-link svg {
    width: 12px;
    height: 12px;
    transition: transform 0.16s ease;
  }

  .card:hover .open-link svg { transform: translateX(3px); }

  @keyframes rise {
    to { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .card { animation: none; opacity: 1; transform: none; }
    .card, .card:hover { transition: none; }
  }

  /* ---- State messages ---- */
  .state-msg {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--n-500);
    padding: 20px 0;
  }

  .state-msg.error { color: var(--error); }

  footer {
    margin-top: 64px;
    padding-top: 20px;
    border-top: 1px solid var(--n-200);
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--n-400);
    letter-spacing: 0.05em;
  }

  @media (max-width: 480px) {
    .top { flex-wrap: wrap; gap: 12px; }
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="top">
    <div class="brand"><span class="dot"></span><span>poc-test</span></div>
    <div class="status-pill" id="status-pill">— items</div>
  </div>

  <div class="hero">
    <div class="eyebrow">Prototype catalog</div>
    <h1>試作品の一覧</h1>
    <p>ここに置かれた各PoCへのリンクです。新しいフォルダを追加してpushすると、次にこのページを開いたときに自動で一覧に加わります。</p>
  </div>

  <div id="grid" class="grid">
    <div class="state-msg" id="status-msg">読み込み中...</div>
  </div>

  <footer>Static demo catalog — updates on push</footer>
</div>

<script>
  const OWNER = "iwasakiterukazuimpl";
  const REPO = "poc-test";

  const grid = document.getElementById("grid");
  const statusMsg = document.getElementById("status-msg");
  const statusPill = document.getElementById("status-pill");

  function openIcon() {
    return '<svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">' +
      '<path d="M2 10L10 2M10 2H4M10 2V8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>' +
      '</svg>';
  }

  function renderCards(dirs) {
    grid.innerHTML = "";

    if (dirs.length === 0) {
      grid.innerHTML = '<div class="state-msg">まだPoCがありません。poc- で始まるフォルダを追加してください。</div>';
      statusPill.textContent = "0 items";
      return;
    }

    statusPill.textContent = dirs.length + " items";

    dirs.forEach((dir, i) => {
      const card = document.createElement("a");
      card.href = "./" + dir.name + "/";
      card.className = "card";
      card.style.animationDelay = (i * 0.06) + "s";

      const displayName = dir.name
        .replace(/^poc-/, "")
        .replace(/[-_]/g, " ")
        .replace(/\b\w/g, c => c.toUpperCase());

      card.innerHTML =
        '<div class="spec-no">POC-' + String(i + 1).padStart(2, "0") + '</div>' +
        '<h2>' + displayName + '</h2>' +
        '<span class="open-link">Open ' + openIcon() + '</span>';

      grid.appendChild(card);
    });
  }

  fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/`)
    .then(res => {
      if (!res.ok) throw new Error("GitHub API error: " + res.status);
      return res.json();
    })
    .then(items => {
      const dirs = items
        .filter(item => item.type === "dir" && item.name.startsWith("poc-"))
        .sort((a, b) => a.name.localeCompare(b.name));
      renderCards(dirs);
    })
    .catch(err => {
      statusMsg.className = "state-msg error";
      statusMsg.textContent = "一覧の取得に失敗しました（" + err.message + "）";
      grid.innerHTML = "";
      grid.appendChild(statusMsg);
      statusPill.textContent = "error";
      console.error(err);
    });
</script>

</body>
</html>
